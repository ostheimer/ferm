name: Preview Smoke

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      preview_url:
        description: Preview-URL fuer den manuellen Smoke-Lauf
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: preview-smoke-${{ github.event.deployment.id || inputs.preview_url || github.run_id }}
  cancel-in-progress: true

jobs:
  resolve-target:
    name: Resolve Preview Target
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.resolve.outputs.should_run }}
      preview_url: ${{ steps.resolve.outputs.preview_url }}
    steps:
      - name: Resolve preview URL
        id: resolve
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_PREVIEW_URL: ${{ inputs.preview_url }}
          DEPLOYMENT_STATE: ${{ github.event.deployment_status.state }}
          DEPLOYMENT_ENVIRONMENT: ${{ github.event.deployment.environment }}
          DEPLOYMENT_ENVIRONMENT_URL: ${{ github.event.deployment_status.environment_url }}
          DEPLOYMENT_TARGET_URL: ${{ github.event.deployment_status.target_url }}
        run: |
          node <<'EOF'
          const fs = require("node:fs");

          const eventName = process.env.EVENT_NAME ?? "";
          const manualPreviewUrl = process.env.INPUT_PREVIEW_URL?.trim() ?? "";
          const deploymentState = process.env.DEPLOYMENT_STATE?.trim().toLowerCase() ?? "";
          const deploymentEnvironment = process.env.DEPLOYMENT_ENVIRONMENT?.trim() ?? "";
          const environmentUrl = process.env.DEPLOYMENT_ENVIRONMENT_URL?.trim() ?? "";
          const targetUrl = process.env.DEPLOYMENT_TARGET_URL?.trim() ?? "";

          function setOutput(name, value) {
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `${name}=${value}\n`);
          }

          function skip(message) {
            console.log(message);
            setOutput("should_run", "false");
          }

          function normalizePreviewUrl(value) {
            if (!value) {
              return "";
            }

            try {
              const url = new URL(value);
              return url.origin + url.pathname.replace(/\/$/, "");
            } catch {
              return "";
            }
          }

          function resolveFallbackTarget(value) {
            if (!value) {
              return "";
            }

            try {
              const url = new URL(value);
              const host = url.hostname.toLowerCase();

              if (host.endsWith("vercel.com") || host.endsWith("github.com")) {
                return "";
              }

              return normalizePreviewUrl(value);
            } catch {
              return "";
            }
          }

          if (eventName === "workflow_dispatch") {
            const previewUrl = normalizePreviewUrl(manualPreviewUrl);

            if (!previewUrl) {
              throw new Error("workflow_dispatch requires a valid preview_url input.");
            }

            console.log(`Manual preview smoke for ${previewUrl}`);
            setOutput("should_run", "true");
            setOutput("preview_url", previewUrl);
            process.exit(0);
          }

          if (deploymentState !== "success") {
            skip(`Skipping preview smoke for deployment state "${deploymentState || "unknown"}".`);
            process.exit(0);
          }

          const normalizedEnvironment = deploymentEnvironment.toLowerCase();
          if (normalizedEnvironment === "production" || normalizedEnvironment === "prod") {
            skip(`Skipping preview smoke for production deployment "${deploymentEnvironment}".`);
            process.exit(0);
          }

          const previewUrl =
            normalizePreviewUrl(environmentUrl) ||
            resolveFallbackTarget(targetUrl);

          if (!previewUrl) {
            skip("Skipping preview smoke because no usable preview URL was found in the deployment status payload.");
            process.exit(0);
          }

          console.log(`Resolved preview smoke target ${previewUrl}`);
          setOutput("should_run", "true");
          setOutput("preview_url", previewUrl);
          EOF

      - name: Explain skip
        if: steps.resolve.outputs.should_run != 'true'
        run: echo "Preview smoke was skipped for this event."

  preview-smoke:
    name: Preview Smoke
    runs-on: ubuntu-latest
    needs: resolve-target
    if: needs.resolve-target.outputs.should_run == 'true'
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run preview smoke
        env:
          PREVIEW_URL: ${{ needs.resolve-target.outputs.preview_url }}
        run: node ./apps/web/scripts/smoke-preview.mjs "$PREVIEW_URL"
