services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: ferm-postgres
    environment:
      POSTGRES_DB: ferm
      POSTGRES_USER: ferm
      POSTGRES_PASSWORD: ferm
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: ferm-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
